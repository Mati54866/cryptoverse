<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/cryptocurrency.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#001529" />
    <meta name="description" content="Cryptoverse - Track crypto prices, market cap, and news in real time." />
    <title>Cryptoverse</title>

    <!-- Preconnect to speed up CDN and API fetches -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin />
    <link rel="preconnect" href="https://coinranking.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.rss2json.com" />

    <!-- Ant Design CSS via CDN — loads in parallel with JS, no bundle bloat -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/antd@4.24.16/dist/antd.min.css"
      crossorigin="anonymous"
    />

    <!-- Inline critical styles so the shell renders immediately -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; background: #001529; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      #root { min-height: 100vh; }
      .app-shell-loader {
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; flex-direction: column; gap: 16px; color: #fff;
      }
      .app-shell-loader .spinner {
        width: 48px; height: 48px; border: 4px solid rgba(255,255,255,0.2);
        border-top-color: #1890ff; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <!-- Instant shell shown before React hydrates -->
    <div id="root">
      <div class="app-shell-loader">
        <div class="spinner"></div>
        <p style="margin:0;font-size:14px;opacity:0.7">Loading Cryptoverse…</p>
      </div>
    </div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
